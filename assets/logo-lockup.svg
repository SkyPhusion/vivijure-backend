<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="skyphusion labs">
  <!--
    skyphusion labs - horizontal lockup (fusion-rising mark + outlined wordmark)
    Designed for light backgrounds (Cloudflare Access default, white pages, etc.)
    For dark backgrounds, change fill="#0a0f1e" on the wordmark to fill="#ffffff";
    "LABS" (fill="#06b6d4") stays as-is (already bright enough).

    The wordmark is OUTLINED to vector paths (Montserrat: Bold for "skyphusion",
    Regular for "LABS"), so the lockup renders pixel-identical on every OS and in
    every renderer (rsvg, Cloudflare Access logo upload, etc.) with no font
    dependency. The original three-bar icon is preserved as logo-icon-bars.svg.
  -->
  <defs>
    <!-- Sky gradient: deep blue (bottom-left) -> electric cyan (top-right), icon space coords -->
    <linearGradient id="sky" x1="12" y1="52" x2="52" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Subtle radial sheen on the icon background (depth, not flat) -->
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#17243d"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
  </defs>

  <!-- Icon: dark rounded square -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!--
    Fusion-rising mark: three ascending streams that fuse into a single apex.
    Reads as ascent (sky) and synthesis of multiple elements into one (fusion),
    not a bar chart. The diagonal gradient stitches the streams into one form.
  -->
  <path d="M9 52L22.4 52L32 22L32 12Z" fill="url(#sky)"/>
  <path d="M25.6 52L38.4 52L32 22Z" fill="url(#sky)"/>
  <path d="M41.6 52L55 52L32 12L32 22Z" fill="url(#sky)"/>

  <!-- Wordmark "skyphusion" - Montserrat Bold, outlined to paths -->
