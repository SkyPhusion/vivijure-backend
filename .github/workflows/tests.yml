name: tests

# The CI gate for vivijure-backend (the Python equivalent of skyphusion-llm-
# public's typecheck gate). The heavy GPU deps (torch/diffusers) live only in
# deploy/requirements.txt and are deferred-imported, so the suite runs CPU-only
# on a GitHub-hosted runner with just PyYAML + pytest. Branch protection on main
# requires this "tests" check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest
